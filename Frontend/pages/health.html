<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crop Health - CropRec</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background-color: #eefdf3; }

    .logo {
      width: 260px;
      height: 40px;
      background-image: url("../images/final.png");
      background-size: contain;
      background-repeat: no-repeat;
      background-position: left center;
      transform: scale(3.6);
      transform-origin: left center;
      margin-top: -23px;
    }

    .active-link {
      color: #b7f7c1 !important;
      border-bottom: 2px solid white;
      padding-bottom: 2px;
    }
  </style>
</head>

<body class="min-h-screen">

<!-- ✅ NAVBAR (SAME AS MAIN SITE) -->
<nav class="fixed top-0 left-0 w-full bg-[#0F8A4B] text-white shadow-lg 
    px-6 md:px-12 py-4 flex items-center justify-between z-50">

  <div class="logo"></div>

  <ul class="hidden md:flex items-center gap-8 text-lg font-medium">

    <li><a href="index.html" class="hover:text-green-200">Home</a></li>
    <li><a href="services.html" class="hover:text-green-200 active-link">Services</a></li>
    <li><a href="contact.html" class="hover:text-green-200">Contact</a></li>

    <!-- LOGIN -->
    <li id="loginNav">
      <a href="login.html" class="hover:text-green-200">Login</a>
    </li>

    <!-- USER MENU -->
    <li id="userMenu" class="relative hidden">

      <div id="userIcon"
        class="w-10 h-10 bg-white/90 text-green-900 font-bold rounded-full 
         flex items-center justify-center cursor-pointer 
         shadow-md border border-green-300">
      </div>

      <div id="userDropdown"
        class="absolute right-0 mt-2 w-40 bg-white text-black shadow-lg 
               border border-green-200 rounded-xl hidden">

        <a href="dashboard.html" class="block px-4 py-2 hover:bg-green-100">
          Dashboard
        </a>

        <button onclick="logout()"
          class="w-full text-left px-4 py-2 hover:bg-red-100 text-red-700">
          Logout
        </button>

      </div>
    </li>

  </ul>
</nav>

<!-- ✅ MAIN SECTION -->
<section class="pt-32 pb-16 px-6">

  <div class="max-w-4xl mx-auto bg-white shadow-xl rounded-2xl p-10 text-center">

    <h1 class="text-4xl font-extrabold text-green-900 mb-6">
      Crop Health Detection
    </h1>

    <p class="text-gray-600 mb-8">
      Upload a crop image to detect diseases and health condition using AI.
    </p>

    <!-- IMAGE INPUT -->
    <input type="file" id="imageInput"
      class="block mx-auto mb-6 border p-2 rounded-lg" />

    <!-- PREVIEW -->
    <img id="preview" class="mx-auto mb-6 hidden w-64 rounded-lg shadow" />

    <!-- BUTTON -->
    <button onclick="analyzeImage()"
      class="px-8 py-3 bg-green-700 text-white rounded-xl hover:bg-green-800 transition">
      Analyze Health
    </button>

    <!-- LOADING -->
    <p id="loading" class="mt-6 text-green-700 hidden">Analyzing...</p>

    <!-- RESULT -->
    <div id="result" class="mt-8 text-left"></div>

  </div>

</section>

<!-- ✅ SCRIPT -->
<script>
let selectedImage = null;

// Image preview
document.getElementById("imageInput").addEventListener("change", function(e) {
  const file = e.target.files[0];
  if (!file) return;

  selectedImage = file;

  const preview = document.getElementById("preview");
  preview.src = URL.createObjectURL(file);
  preview.classList.remove("hidden");
});

// Convert to base64
function toBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

// Main function
async function analyzeImage() {

  if (!selectedImage) {
    alert("Upload image first");
    return;
  }

  const loading = document.getElementById("loading");
  const resultDiv = document.getElementById("result");

  loading.classList.remove("hidden");
  resultDiv.innerHTML = "";

  try {
    const base64 = await toBase64(selectedImage);

    const res = await fetch("http://localhost:5000/Health", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ image: base64 })
    });

    const data = await res.json();
    loading.classList.add("hidden");

    // SAFE ACCESS
    const disease = data?.result?.disease?.suggestions?.[0];
    const crop = data?.result?.crop?.suggestions?.[0];

    if (!disease || !crop) {
      resultDiv.innerHTML = `
        <p class="text-red-500 text-center">
          No disease detected or invalid image
        </p>
      `;
      return;
    }

    // Format symptoms
    const symptoms = disease.details?.symptoms
      ? Object.values(disease.details.symptoms).join("<br>")
      : "Not available";

    // Format treatment
    const treatment = disease.details?.treatment?.prevention
      ? disease.details.treatment.prevention.join("<br>")
      : "No treatment info";

    resultDiv.innerHTML = `
      <div class="bg-white shadow-lg rounded-2xl p-6 border border-green-200">

        <h2 class="text-3xl font-bold text-green-800 mb-4 text-center">
          🌿 ${crop.name.toUpperCase()}
        </h2>

        <div class="bg-green-50 p-4 rounded-lg mb-4">
          <h3 class="text-xl font-semibold text-red-600">
            🦠 ${disease.name}
          </h3>

          <p class="text-gray-700 mt-2">
            <strong>Confidence:</strong> ${(disease.probability * 100).toFixed(2)}%
          </p>
        </div>


        

        <p class="text-gray-700">
          <strong>Treatment:</strong><br>
          ${treatment}
        </p>
        
      </div> 
    `;

  } catch (err) {
    console.error(err);
    loading.innerText = "Error occurred";
  }
}

// USER MENU (keep your navbar working)
function loadUser() {
  const user = JSON.parse(localStorage.getItem("user"));
  if (!user) return;

  document.getElementById("loginNav").classList.add("hidden");
  document.getElementById("userMenu").classList.remove("hidden");

  document.getElementById("userIcon").innerText =
    user.name.charAt(0).toUpperCase();
}

document.addEventListener("click", (e) => {
  const icon = document.getElementById("userIcon");
  const dropdown = document.getElementById("userDropdown");

  if (icon.contains(e.target)) dropdown.classList.toggle("hidden");
  else if (!dropdown.contains(e.target)) dropdown.classList.add("hidden");
});

function logout() {
  localStorage.removeItem("user");
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

loadUser();
</script>
</body>
</html>
