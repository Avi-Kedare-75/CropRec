<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pesticide Recommendation</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { background-color: #ddf1e6; }
    .logo {
  width: 260px;
  height: 40px;

  background-image: url("../images/final.png");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: left center;

  transform: scale(3.6);
  transform-origin: left center;

  margin-top: -23px;   
}
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 w-full bg-[#0F8A4B] text-white shadow-lg 
      px-6 md:px-12 py-4 flex items-center justify-between z-50">

  <div class="logo"></div>

    <ul class="hidden md:flex items-center gap-8 text-lg font-medium">

      <li><a href="index.html" class="hover:text-green-200">Home</a></li>
      <li><a href="services.html" class="hover:text-green-200">Services</a></li>
      <li><a href="contact.html" class="hover:text-green-200">Contact</a></li>

      <!-- LOGIN (shown when not logged in) -->
      <li id="loginNav">
        <a href="login.html" class="hover:text-green-200">Login</a>
      </li>

      <!-- USER MENU (hidden by default) -->
      <li id="userMenu" class="relative hidden">

        <!-- USER ICON -->
        <div id="userIcon"
  class="w-10 h-10 bg-white/90 text-green-900 font-bold rounded-full 
         flex items-center justify-center cursor-pointer 
         shadow-md border border-green-300">
</div>


        <!-- DROPDOWN -->
        <div id="userDropdown"
          class="absolute right-0 mt-2 w-40 bg-white text-black shadow-lg 
                 border border-green-200 rounded-xl hidden">

          <a href="dashboard.html" class="block px-4 py-2 hover:bg-green-100">
            Dashboard
          </a>

          <button onclick="logout()"
            class="w-full text-left px-4 py-2 hover:bg-red-100 text-red-700">
            Logout
          </button>

        </div>

      </li>

    </ul>
  </nav>



  <!-- MAIN SECTION -->
  <section class="pt-40 pb-20 px-6 flex justify-center">
    <div class="max-w-6xl w-full grid grid-cols-1 md:grid-cols-2 gap-10">

      <!-- LEFT MODERN CARD -->
      <div class="bg-white shadow-xl rounded-3xl p-10 border border-green-300">

        <h2 class="text-3xl font-extrabold text-green-900 mb-2">🤖 AI Pesticide Assistant</h2>

        <p class="text-gray-700 mb-8">
          Enter the crop name to get disease-wise pesticide recommendations.
        </p>

        <form class="space-y-10" onsubmit="getPesticide(event)">

          <!-- Crop Name Input -->
          <div>
            <label class="font-semibold text-gray-800 mb-2 block">Crop Name</label>

            <div class="relative">
              <span class="absolute left-3 top-3 text-2xl">🌿</span>

              <input id="cropInput" type="text"
                placeholder="e.g., Tomato, Wheat, Paddy"
                class="w-full p-3 pl-12 border border-green-400 rounded-xl outline-none 
                       focus:ring-2 focus:ring-green-600 bg-green-50">
            </div>
          </div>

          <!-- Button -->
          <button
            class="w-full bg-green-700 hover:bg-green-800 text-white py-3 rounded-xl text-lg transition">
            Get Pesticide Recommendation
          </button>

        </form>
      </div>

      <!-- RIGHT RESULT CARD -->
      <div class="bg-white shadow-xl rounded-3xl p-10 border border-green-300 text-center">

        <div class="text-8xl mb-4">🧪</div>

        <h3 class="text-3xl font-bold text-green-900 mb-4">Smart Pesticide Advisor</h3>

        <p class="text-gray-700">Your pesticide recommendations will appear here.</p>

        <div id="resultBox" class="mt-8 bg-green-50 p-6 rounded-xl border border-green-300 text-left">
          <p class="text-gray-600 text-lg">No results yet.</p>
        </div>
      </div>

    </div>
  </section>


  <!-- JAVASCRIPT FOR API CONNECTION -->
  <script>
async function getPesticide(event) {
  event.preventDefault();

  const crop = document.getElementById("cropInput").value.trim();
  const resultBox = document.getElementById("resultBox");

  if (!crop) {
    resultBox.innerHTML = `<p class="text-red-600 font-semibold">⚠ Please enter a crop name.</p>`;
    return;
  }

  resultBox.innerHTML = `
    <div class="text-center py-6">
      <div class="animate-spin h-10 w-10 border-4 border-green-600 border-t-transparent rounded-full mx-auto"></div>
      <p class="mt-4 text-green-800 font-semibold">Fetching recommendations...</p>
    </div>
  `;

  try {
    const res = await fetch("http://localhost:5000/pesticide", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ crop })
    });

    const data = await res.json();

    if (data.error) {
      resultBox.innerHTML = `<p class="text-red-600 font-semibold">${data.error}</p>`;
      return;
    }

    let html = `
      <h3 class="text-xl font-bold text-green-900 mb-4">
        🌾 Pesticide Plan for ${crop}
      </h3>
    `;

    const phaseNames = {
      phase1: "🌱 Early Stage",
      phase2: "🌿 Growth Stage",
      phase3: "🌾 Flowering / Fruiting Stage"
    };

    for (let phase in data.phases) {
      const items = data.phases[phase];

      if (!items || items.length === 0) continue;

      html += `
        <div class="mb-6">
          <h4 class="text-lg font-semibold text-green-700 mb-2">
            ${phaseNames[phase]}
          </h4>
      `;

      items.forEach(item => {
        html += `
          <div class="bg-white p-4 rounded-xl mb-3 border shadow-sm">
            <p class="font-semibold text-green-800">Disease: ${item.disease}</p>
            <p class="text-gray-800"><b>Pesticide:</b> ${item.pesticide}</p>
            <p class="text-gray-800"><b>Instructions:</b> ${item.instructions}</p>
          </div>
        `;
      });

      html += `</div>`;
    }

    resultBox.innerHTML = html;

  } catch (err) {
    resultBox.innerHTML = `<p class="text-red-600">Server error: ${err.message}</p>`;
  }
}
</script>

  <!-- ✅ UNIVERSAL NAVBAR LOGIN HANDLER -->
  <script src="nav.js"></script>

</body>
</html>
