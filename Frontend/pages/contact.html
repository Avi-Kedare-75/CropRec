<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-translate="Contact - CropRec">Contact - CropRec</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #ddf1e6; }
    .logo {
  width: 260px;
  height: 40px;

  background-image: url("../images/final.png");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: left center;

  transform: scale(3.6);
  transform-origin: left center;

  margin-top: -23px;   
}
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 w-full bg-[#0F8A4B]/80 backdrop-blur-lg border-b border-white/10 text-white shadow-xl 
    px-6 md:px-12 py-4 flex items-center justify-between z-50 transition-all duration-300">

  <div class="logo"></div>

  <ul class="hidden md:flex items-center gap-8 text-lg font-medium">

    <li><a href="index.html" class="hover:text-green-200" data-translate="Home">Home</a></li>
    <li><a href="services.html" class="hover:text-green-200" data-translate="Services">Services</a></li>
    <li><a href="contact.html" class="hover:text-green-200" data-translate="Contact">Contact</a></li>

    <!-- LOGIN BUTTON -->
    <li id="loginNav">
      <a href="login.html" class="hover:text-green-200" data-translate="Login">Login</a>
    </li>

    <!-- USER MENU -->
    <li id="userMenu" class="relative hidden">
      <div id="userIcon"
        class="w-10 h-10 bg-white/90 text-green-900 font-bold rounded-full 
               flex items-center justify-center cursor-pointer 
               shadow-md border border-green-300"></div>

      <div id="userDropdown"
        class="absolute right-0 mt-2 w-40 bg-white text-black shadow-lg 
               border border-green-200 rounded-xl hidden">

        <a href="dashboard.html" class="block px-4 py-2 hover:bg-green-100" data-translate="Dashboard">
          Dashboard
        </a>

        <button onclick="logout()"
          class="w-full text-left px-4 py-2 hover:bg-red-100 text-red-700"
          data-translate="Logout">Logout</button>
      </div>
    </li>

  </ul>
</nav>


<!-- CONTACT FORM BOX -->
<section class="pt-40 pb-20 px-6 flex justify-center min-h-screen items-center bg-gradient-to-br from-[#eefdf3] to-[#c6f7d0]">
  <div class="bg-white/70 backdrop-blur-xl shadow-2xl rounded-3xl p-10 border border-white/50 w-full max-w-xl transition-all duration-300 hover:shadow-green-500/20">

    <h2 class="text-4xl font-extrabold text-green-900 text-center"
        data-translate="Contact Us">Contact Us</h2>

    <p class="text-gray-700 text-center mt-3 mb-8"
       data-translate="We would love to hear from you.">
      We would love to hear from you.
    </p>

    <form class="space-y-6">

      <!-- NAME -->
      <div>
        <label class="font-semibold text-gray-800" data-translate="Name">Name</label>
        <input type="text" 
          class="w-full p-3 border mt-2 border-green-400 rounded-xl"
          placeholder="Enter your name"
          data-translate-placeholder="Enter your name"
          required>
      </div>

      <!-- EMAIL -->
      <div>
        <label class="font-semibold text-gray-800" data-translate="Email">Email</label>
        <input type="email"
          class="w-full p-3 border mt-2 border-green-400 rounded-xl"
          placeholder="Enter your email"
          data-translate-placeholder="Enter your email"
          required>
      </div>

      <!-- MESSAGE -->
      <div>
        <label class="font-semibold text-gray-800" data-translate="Message">Message</label>
        <textarea rows="4"
          class="w-full p-3 border mt-2 border-green-400 rounded-xl"
          placeholder="Write your message..."
          data-translate-placeholder="Write your message..."
          required></textarea>
      </div>

      <!-- BUTTON -->
      <button
        class="w-full bg-gradient-to-r from-green-600 to-green-800 hover:from-green-700 hover:to-green-900 text-white py-3 rounded-xl text-lg font-semibold shadow-lg transition-all duration-300 hover:scale-[1.02]"
        data-translate="Send Message">
        Send Message
      </button>

    </form>

  </div>
</section>

<!-- REMOVE OLD TRANSLATION SCRIPT -->
<script>
  
const form = document.querySelector("form");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const inputs = form.querySelectorAll("input, textarea");

  const data = {
    name: inputs[0].value,
    email: inputs[1].value,
    message: inputs[2].value,
  };

  try {
    const res = await fetch("http://localhost:5000/contact", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(data),
    });

    const result = await res.json();

    if (result.success) {
      alert("Message sent successfully!");
      form.reset();
    } else {
      alert("Failed to send message");
    }

  } catch (err) {
    console.error(err);
    alert("Server error");
  }
});

</script>

<!-- UNIVERSAL NAVBAR + TRANSLATION -->
<script src="nav.js"></script>
<script src="translate.js"></script>

</body>
</html>
