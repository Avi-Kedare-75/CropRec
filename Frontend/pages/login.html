<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-translate="Login - CropRec">Login - CropRec</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body { font-family: 'Inter', sans-serif; background-color: #ddf1e6; }

    /* Highlight current page in navbar */
    .active-link {
      color: #b7f7c1 !important;
      border-bottom: 2px solid white;
      padding-bottom: 2px;
    }
    .logo {
  width: 260px;
  height: 40px;

  background-image: url("../images/final.png");
  background-size: contain;
  background-repeat: no-repeat;
  background-position: left center;

  transform: scale(3.6);
  transform-origin: left center;

  margin-top: -23px;   
}
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="fixed top-0 left-0 w-full bg-[#0F8A4B]/80 backdrop-blur-lg border-b border-white/10 text-white shadow-xl 
    px-6 md:px-12 py-4 flex items-center justify-between z-50 transition-all duration-300">

  <div class="logo"></div>

  <ul class="hidden md:flex items-center gap-8 text-lg font-medium">
    <li><a href="index.html" class="hover:text-green-200" data-translate="Home">Home</a></li>
    <li><a href="services.html" class="hover:text-green-200" data-translate="Services">Services</a></li>
    <li><a href="contact.html" class="hover:text-green-200" data-translate="Contact">Contact</a></li>

    <li id="loginNav">
      <a href="login.html" class="hover:text-green-200" data-translate="Login">Login</a>
    </li>

    <li id="userMenu" class="relative hidden">

      <div id="userIcon"
        class="w-10 h-10 bg-white/90 text-green-900 font-bold rounded-full 
               flex items-center justify-center cursor-pointer 
               shadow-md border border-green-300"></div>

      <div id="userDropdown"
        class="absolute right-0 mt-2 w-40 bg-white text-black shadow-lg 
               border border-green-200 rounded-xl hidden">

        <a href="dashboard.html" class="block px-4 py-2 hover:bg-green-100" data-translate="Dashboard">
          Dashboard
        </a>

        <button onclick="logout()"
          class="w-full text-left px-4 py-2 hover:bg-red-100 text-red-700"
          data-translate="Logout">
          Logout
        </button>

      </div>
    </li>

  </ul>
</nav>


<!-- LOGIN CARD -->
<section class="pt-40 pb-20 px-6 flex justify-center min-h-screen items-center bg-gradient-to-br from-[#eefdf3] to-[#c6f7d0]">
  <div class="bg-white/60 backdrop-blur-xl shadow-2xl border border-white/50 rounded-3xl p-10 w-full max-w-md relative transition-all duration-300 hover:shadow-green-500/20">

    <a href="index.html"
      class="absolute top-4 right-4 bg-red-500 hover:bg-red-600 text-white rounded-full w-8 h-8 
             flex items-center justify-center">✖</a>

    <h2 class="text-4xl font-extrabold text-green-900 text-center mb-6" data-translate="Login">Login</h2>

    <form id="loginForm" class="space-y-6">

      <!-- EMAIL -->
      <div>
        <label class="font-semibold text-gray-800" data-translate="Email">Email</label>
        <input id="email" type="email" required
          class="w-full mt-2 p-3 border border-green-400 rounded-xl outline-none"
          placeholder="Enter your email">
      </div>

      <!-- PASSWORD -->
      <div>
        <label class="font-semibold text-gray-800" data-translate="Password">Password</label>
        <input id="password" type="password" required
          class="w-full mt-2 p-3 border border-green-400 rounded-xl outline-none"
          placeholder="Enter your password">
      </div>

      <button
        class="w-full bg-gradient-to-r from-green-600 to-green-800 hover:from-green-700 hover:to-green-900 text-white py-3 rounded-xl text-lg font-semibold shadow-lg transition-all duration-300 hover:scale-[1.02]"
        data-translate="Login">
        Login
      </button>

      <p class="text-center text-gray-700 mt-4">
        <span data-translate="New user?">New user?</span>
        <a href="register.html" class="text-green-700 font-semibold hover:underline" data-translate="Register">
          Register
        </a>
      </p>

    </form>

    <p id="errorMsg" class="text-red-600 mt-3 text-center font-semibold hidden"></p>

  </div>
</section>



<!-- LOGIN SCRIPT -->
<script>
const API = "http://localhost:5000";

// JWT decoder
function parseJwt(token) {
  try {
    return JSON.parse(atob(token.split('.')[1]));
  } catch {
    return null;
  }
}

document.getElementById("loginForm").addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorMsg = document.getElementById("errorMsg");

  try {
    const res = await fetch(API + "/auth/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password })
    });

    const data = await res.json();

    if (data.error) {
      errorMsg.classList.remove("hidden");
      errorMsg.innerText = data.error;
      return;
    }

    const decoded = parseJwt(data.token);

    if (!decoded) {
      errorMsg.classList.remove("hidden");
      errorMsg.innerText = "Token invalid.";
      return;
    }

    // Save user data
    localStorage.setItem("token", data.token);
    localStorage.setItem("user", JSON.stringify({
      id: decoded.id,
      name: decoded.name,
      email: decoded.email
    }));

    window.location.href = "dashboard.html";

  } catch (err) {
    errorMsg.classList.remove("hidden");
    errorMsg.innerText = "Server error: " + err.message;
  }
});
</script>

<!-- ACTIVE NAVBAR + TRANSLATION -->
<script src="nav.js"></script>
<script src="translate.js"></script>

<!-- ⭐ ADD ACTIVE NAV HIGHLIGHT FOR LOGIN PAGE -->
<script>
  const currentPage = window.location.pathname.split("/").pop();

  // Highlight navbar link
  document.querySelectorAll("nav a").forEach(link => {
    if (link.getAttribute("href") === currentPage) {
      link.classList.add("active-link");
    }
  });
</script>

</body>
</html>
